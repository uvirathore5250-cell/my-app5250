<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENZO FITNESS - Premium Gym</title>
    <style>
        :root { 
            --neon: #92d050; 
            --neon-glossy: linear-gradient(90deg, #92d050 0%, #d4ffaa 50%, #92d050 100%);
            --bg: #050505; 
            --card: #121212; 
            --text: #eee; 
        }
        @keyframes flow { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        input[type="radio"] { display: none; }
        
        header { background: #000; padding: 15px; position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; color: #fff; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        nav { display: flex; gap: 8px; }
        .nav-btn { background: #1a1a1a; color: #aaa; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: 800; text-transform: uppercase; border: 1px solid #333; transition: 0.3s; }
        
        #t1:checked ~ header nav label[for="t1"], #t2:checked ~ header nav label[for="t2"], #t3:checked ~ header nav label[for="t3"] { background: var(--neon-glossy); background-size: 200% auto; animation: flow 3s linear infinite; color: #000; border-color: var(--neon); }
        
        .main-view { margin-top: 85px; padding: 20px; }
        section { display: none; max-width: 900px; margin: 0 auto; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #t1:checked ~ .main-view #home, #t2:checked ~ .main-view #membership, #t3:checked ~ .main-view #training { display: block; }
        
        .hero-card { background: #1a1a1a; padding: 45px 20px; border-radius: 20px; text-align: center; margin-bottom: 25px; border: 1px solid #333; }
        #price-tag { font-size: 42px; color: var(--neon); margin: 15px 0; display: none; font-weight: 900; }
        .offer-btn { background: var(--neon-glossy); padding: 15px 30px; border-radius: 50px; color: #000; font-weight: 900; cursor: pointer; display: inline-block; transition: 0.3s; border: none; font-size: 16px; margin: 15px 0; }
        
        .bullet-list { background: #111; padding: 25px; border-radius: 15px; border-left: 5px solid var(--neon); margin-bottom: 20px; list-style-type: none; }
        .bullet-list li { font-size: 14px; color: #eee; padding: 6px 0; font-weight: 500; }
        .bullet-list li::before { content: "● "; color: var(--neon); margin-right: 8px; }
        
        .plan-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .plan-card { background: #121212; border: 1px solid #222; border-radius: 15px; padding: 20px; border-top: 4px solid var(--neon); }
        .price { font-size: 32px; font-weight: 900; color: var(--neon); margin: 10px 0; }
        
        .table-container { background: #121212; padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 25px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: var(--neon); font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #222; }
        td { padding: 12px; border-bottom: 1px solid #111; font-size: 14px; }
        .footer { text-align: center; padding: 35px; opacity: 0.4; font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <input type="radio" name="tabs" id="t1" checked>
    <input type="radio" name="tabs" id="t2">
    <input type="radio" name="tabs" id="t3">

    <header>
        <div class="logo">KENZO FITNESS</div>
        <nav>
            <label for="t1" class="nav-btn">Home</label>
            <label for="t2" class="nav-btn">Membership</label>
            <label for="t3" class="nav-btn">PT & More</label>
        </nav>
    </header>

    <div class="main-view">
        <section id="home">
            <div class="hero-card">
                <p style="font-weight: 800; letter-spacing: 1px;">LIMITED PERIOD OFFER</p>
                <button class="offer-btn" id="btn-reveal" onclick="revealPrice()">CLICK TO VIEW OFFER PRICE</button>
                <h1 id="price-tag">₹17,499/-</h1>
                <p style="font-weight: 700; letter-spacing: 0.5px;">ANNUAL GYM MEMBERSHIP</p>
            </div>
            <ul class="bullet-list">
                <li>One of the most Premium Gym in Vashi vicinity.</li>
                <li>State of Art Equipment.</li>
                <li>Paid Lockers Available.</li>
            </ul>
        </section>

        <section id="membership">
            <div class="plan-grid">
                <div class="plan-card"><h3>1 YEAR</h3><div class="price">25,000/-</div></div>
            </div>
        </section>

        <section id="training">
            <div class="table-container">
                <table>
                    <thead><tr><th>Package</th><th>Rates</th></tr></thead>
                    <tbody><tr><td>Personal Training</td><td>12,000</td></tr></tbody>
                </table>
            </div>
        </section>
        
        <div class="footer">CHEMBUR • ULWE • VASHI</div>
    </div>

    <script>
        function revealPrice() {
            document.getElementById('btn-reveal').style.display = 'none';
            document.getElementById('price-tag').style.display = 'block';
        }
    </script>
</body>
</html>
