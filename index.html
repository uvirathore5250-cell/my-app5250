<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAISO Premium - Baner Launch</title>

<style>
:root { 
--neon: #92d050; 
--bg: #050505; 
--card: #121212; 
--text: #eee; 
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
body { background: var(--bg); color: var(--text); overflow:hidden; }

/* 🔥 STICKY TOP BAR */
.top-bar{
position:fixed;
top:0;
width:100%;
background:var(--neon);
color:#000;
text-align:center;
padding:6px;
font-size:12px;
font-weight:900;
z-index:2000;
}

/* HEADER */
header {
background: #000;
padding: 15px;
position: fixed;
top:28px;
width: 100%;
z-index: 1000;
border-bottom: 2px solid var(--neon);
display: flex;
justify-content: space-between;
align-items: center;
}
.logo { font-weight:900; letter-spacing:2px; }
nav { display:flex; gap:5px; overflow-x:auto; }

.nav-btn {
background:#1a1a1a;
color:#777;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
font-size:10px;
font-weight:800;
border:1px solid #333;
}

/* MAIN */
.main-view { margin-top:110px; height:calc(100vh - 110px); overflow-y:auto; padding:20px; }

section { display:none; }
#t1:checked ~ .main-view #home,
#t2:checked ~ .main-view #amenities,
#t3:checked ~ .main-view #membership,
#t4:checked ~ .main-view #training { display:block; }

/* HERO */
.presale-hero {
background: var(--neon);
color:#000;
padding:35px;
border-radius:20px;
text-align:center;
margin-bottom:30px;
}

.old-price{text-decoration:line-through}

.price-display{font-size:60px;font-weight:900;display:none}

#reveal-check{display:none}
#reveal-check:checked ~ .price-reveal-box .reveal-label{display:none}
#reveal-check:checked ~ .price-reveal-box .price-display{display:block}

/* FLOAT BUTTONS */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:#fff;
padding:15px;
border-radius:50%;
z-index:9999;
text-decoration:none;
font-size:20px;
}

.call{
position:fixed;
bottom:80px;
right:20px;
background:#000;
color:var(--neon);
padding:12px;
border-radius:50%;
border:2px solid var(--neon);
z-index:9999;
text-decoration:none;
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
z-index:9999;
justify-content:center;
align-items:center;
}
.popup-box{
background:#fff;
color:#000;
padding:30px;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="top-bar">⚡ Launch Offer Ending Soon | Only 100 Slots Left</div>

<input type="radio" name="tabs" id="t1" checked>
<input type="radio" name="tabs" id="t2">
<input type="radio" name="tabs" id="t3">
<input type="radio" name="tabs" id="t4">

<header>
<div class="logo">TAISO PREMIUM</div>
<nav>
<label for="t1" class="nav-btn">Home</label>
<label for="t2" class="nav-btn">Amenities</label>
<label for="t3" class="nav-btn">Membership</label>
<label for="t4" class="nav-btn">Training</label>
</nav>
</header>

<div class="main-view">

<section id="home">
<div class="presale-hero">
<h1>Opening Offer</h1>
<div class="old-price">₹24,999</div>

<input type="checkbox" id="reveal-check">
<div class="price-reveal-box">
<label for="reveal-check" class="reveal-label">Unlock Launch Price 🔥</label>
<div class="price-display">₹19,999</div>
</div>

<p>⚠️ Only for First 100 Members</p>
<p style="color:#000;font-weight:900;">🔥 27 People Viewing Now</p>
</div>
</section>

<section id="amenities"><h2>Amenities</h2></section>
<section id="membership"><h2>Membership</h2></section>
<section id="training"><h2>Training</h2></section>

</div>

<!-- FLOAT BUTTONS -->
<a href="https://wa.me/91XXXXXXXXXX" class="whatsapp">💬</a>
<a href="tel:+91XXXXXXXXXX" class="call">📞</a>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-box">
<h2>Wait! Special Offer 🔥</h2>
<p>Extra Discount Available Today</p>
<button onclick="document.getElementById('popup').style.display='none'">Close</button>
</div>
</div>

<script>
setTimeout(()=>{
document.getElementById('popup').style.display='flex'
},8000)
</script>

</body>
</html>
